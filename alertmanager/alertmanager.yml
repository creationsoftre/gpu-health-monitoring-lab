global:
  resolve_timeout: 30s

route:
  receiver: local-remediator
  group_by:
    - alertname
    - severity
  group_wait: 5s
  group_interval: 30s
  repeat_interval: 5m

receivers:
  - name: local-remediator
    webhook_configs:
      - url: http://remediator:5001/alerts
        send_resolved: true
